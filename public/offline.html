<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f6f5f">
    <title>Sem conexão | Check Planilha</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f0e8;
            --surface: rgba(255, 252, 247, 0.96);
            --ink: #181511;
            --muted: #6f6253;
            --line: rgba(24, 21, 17, 0.12);
            --accent: #1f6f5f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(31, 111, 95, 0.14), transparent 30%),
                radial-gradient(circle at right center, rgba(139, 61, 25, 0.14), transparent 24%),
                linear-gradient(180deg, #f8f3ed 0%, var(--bg) 100%);
        }

        .card {
            width: min(560px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--surface);
            box-shadow: 0 16px 38px rgba(38, 28, 12, 0.08);
        }

        .eyebrow {
            display: inline-flex;
            margin-bottom: 14px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(31, 111, 95, 0.12);
            color: var(--accent);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 { margin: 0 0 10px; font-size: 32px; }
        p { margin: 0; color: var(--muted); line-height: 1.6; }
        .actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        button {
            min-height: 44px;
            padding: 11px 16px;
            border: 1px solid var(--ink);
            border-radius: 12px;
            background: var(--ink);
            color: #fffdf8;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="eyebrow">Aplicativo offline</span>
        <h1>Você está sem conexão.</h1>
        <p>
            O Check Planilha precisa de internet para carregar os dados do sistema. Quando a conexão voltar,
            recarregue a página para continuar.
        </p>
        <div class="actions">
            <button type="button" onclick="window.location.reload()">Tentar novamente</button>
        </div>
    </main>
</body>
</html>
