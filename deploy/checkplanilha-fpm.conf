[checkplanilha]
user = wevertonpereiraandrade
group = wevertonpereiraandrade

listen = /run/php-fpm/checkplanilha.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

pm = dynamic
pm.max_children = 12
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

chdir = /var/www/checkplanilha
php_admin_value[error_log] = /var/log/php-fpm/checkplanilha-error.log
php_admin_flag[log_errors] = on
php_value[session.save_path] = /var/www/checkplanilha/storage/framework/sessions
php_value[upload_max_filesize] = 50M
php_value[post_max_size] = 60M
